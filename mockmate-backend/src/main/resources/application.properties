# Application
spring.application.name=mockmate-backend
server.port=8080

# Database (H2 for dev — switch to PostgreSQL for prod)
spring.datasource.url=jdbc:h2:mem:mockmatedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL init
spring.sql.init.mode=always

# JWT
jwt.secret=mockmate-super-secret-jwt-key-change-in-production-must-be-256-bits
jwt.expiration=86400000

# OpenAI
openai.api.key=${OPENAI_API_KEY:sk-your-api-key-here}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o
openai.max-tokens=1024

# Logging
logging.level.com.mockmate=DEBUG
logging.level.org.springframework.security=INFO

